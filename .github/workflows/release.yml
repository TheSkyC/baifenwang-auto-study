name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Extract version
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(\-.+)?$ ]]; then
            echo "::error::Release tag must match vX.Y.Z (e.g. v1.0.0, v1.0.0-beta)"
            exit 1
          fi
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Compute SHA-256
        id: checksum
        run: |
          sha256=$(sha256sum dist/baifenwang-auto-study.user.js | awk '{print $1}')
          echo "sha256=$sha256" >> "$GITHUB_OUTPUT"
          echo "${sha256}  baifenwang-auto-study.user.js" > dist/SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.3.2
        with:
          files: |
            dist/baifenwang-auto-study.user.js
            dist/SHA256SUMS.txt
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          body: |
            ## 安装

            直接点击下方链接通过 Tampermonkey / Violentmonkey 安装：

            👉 [安装脚本](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/baifenwang-auto-study.user.js)

            ## SHA-256

            ```
            ${{ steps.checksum.outputs.sha256 }}  baifenwang-auto-study.user.js
            ```

      # ── Upload to R2 ──────────────────────────────────────────────────────
      - name: Upload versioned artifact to R2
        continue-on-error: true
        uses: cloudflare/wrangler-action@v3.14.1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >
            r2 object put
            baifenwang-releases/${{ github.ref_name }}/baifenwang-auto-study.user.js
            --file dist/baifenwang-auto-study.user.js
            --content-type "application/javascript; charset=utf-8"

      - name: Update latest pointer in R2
        if: |
          !contains(github.ref_name, 'alpha') &&
          !contains(github.ref_name, 'beta') &&
          !contains(github.ref_name, 'rc')
        continue-on-error: true
        uses: cloudflare/wrangler-action@v3.14.1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >
            r2 object put
            baifenwang-releases/latest/baifenwang-auto-study.user.js
            --file dist/baifenwang-auto-study.user.js
            --content-type "application/javascript; charset=utf-8"

      # ── Inject new release into Worker catalog ────────────────────────────
      - name: Compute SHA-256 and file size
        id: artifact
        run: |
          sha256=$(sha256sum dist/baifenwang-auto-study.user.js | awk '{print $1}')
          size=$(stat -c%s dist/baifenwang-auto-study.user.js)
          echo "sha256=$sha256" >> "$GITHUB_OUTPUT"
          echo "size=$size"     >> "$GITHUB_OUTPUT"

      - name: Inject new release into Worker catalog
        env:
          VERSION:        ${{ steps.version.outputs.version }}
          TAG:            ${{ github.ref_name }}
          SHA256:         ${{ steps.artifact.outputs.sha256 }}
          SIZE:           ${{ steps.artifact.outputs.size }}
          REPO:           ${{ github.repository }}
          CDN_BASE:       ${{ secrets.CDN_BASE }}
          CHANGELOG_PATH: ${{ github.workspace }}/CHANGELOG.md
        run: node scripts/inject-release.mjs

      # ── Commit catalog + dist back to master ──────────────────────────────
      - name: Commit catalog update and dist to master
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout master
          git add worker/src/index.js dist/baifenwang-auto-study.user.js
          git commit -m "chore(release): update worker catalog and dist for ${{ github.ref_name }}" || echo "nothing to commit"
          git push origin master

      # Worker is deployed automatically by Cloudflare's GitHub integration
